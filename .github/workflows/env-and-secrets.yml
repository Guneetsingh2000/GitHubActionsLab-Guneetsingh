name: Env and Secrets Workflow

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAME: MyDeployment

    steps:
      - name: Show workflow-level env vars
        run: |
          echo "AWS_REGION=$AWS_REGION"
          echo "ENVIRONMENT=$ENVIRONMENT"

      - name: Show job-level env var
        run: echo "DEPLOYMENT_NAME=$DEPLOYMENT_NAME"

      - name: Show secrets (will be masked)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Step-level env var example
        env:
          STEP_VAR: HelloFromStep
        run: echo "STEP_VAR=$STEP_VAR"
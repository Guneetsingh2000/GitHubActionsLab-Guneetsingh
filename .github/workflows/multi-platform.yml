name: Multi-Platform Testing

on:
  pull_request:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OS info (Linux)
        run: uname -a

      - name: Create file and display (Linux)
        run: |
          echo "Hello from Ubuntu" > os.txt
          cat os.txt

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OS info (Windows)
        run: systeminfo

      - name: Create file and display (Windows)
        run: |
          echo Hello from Windows > os.txt
          type os.txt

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: OS info (macOS)
        run: uname -a

      - name: Create file and display (macOS)
        run: |
          echo "Hello from macOS" > os.txt
          cat os.txt